name: CI flow for Frontend

# FrontendのPR時にテストを実行し、結果をSlackへ通知するワークフロー
on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Slack通知先Webhook（GitHub Secretsから参照）
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    # ソースコードをチェックアウト
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
       node-version: 24

    # テスト実行（リポジトリルートで依存関係を導入して実行）
    - name: Unit Test
      run: cd ${{ github.workspace }}
    - run: npm install && npm run test

    # 成功/失敗/キャンセル時のSlack通知
    - name: Success
      uses: rtCamp/action-slack-notify@v2.0.2
      if: success()
      env:
        SLACK_TITLE: CI flow for Frontend / Success
        SLACK_COLOR: good
        SLACK_MESSAGE: Message for Success

    - name: Failure
      uses: rtCamp/action-slack-notify@v2.0.2
      if: failure()
      env:
        SLACK_TITLE: CI flow for Frontend / Failure
        SLACK_COLOR: danger
        SLACK_MESSAGE: Message for Failure

    - name: Cancel
      uses: rtCamp/action-slack-notify@v2.0.2
      if: cancelled()
      env:
        SLACK_TITLE: CI flow for Frontend / Cancel
        SLACK_COLOR: danger
        SLACK_MESSAGE: Message for Cancel
